<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDExAI.26</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="noise-overlay"></div>

    <div class="guide-lines" aria-hidden="true">
        <div class="guide-line" style="left:20%"></div>
        <div class="guide-line" style="left:50%"></div>
        <div class="guide-line" style="left:80%"></div>
    </div>

    <nav class="site-nav">
        <div class="container nav-inner">
            <div class="nav-logos">
                <img src="assets/logos/ozyegin-university.svg" alt="Özyeğin University Logo" class="logo-uni">
            </div>

            <div class="nav-brand">
                <img src="assets/logos/idexai26.svg" alt="IDExAI.26 Logo" class="logo-idexai">
            </div>

            <div class="lang-switch mobile-only">
                <button onclick="setLanguage('tr')" id="lang-tr-mobile" class="lang-btn active">TR</button>
                <span>|</span>
                <button onclick="setLanguage('en')" id="lang-en-mobile" class="lang-btn">EN</button>
            </div>

            <div class="nav-links desktop-only">
                <a href="#tanitim" data-i18n="nav_manifesto"></a>
                <a href="#yurutuculer" data-i18n="nav_curators"></a>

                <!-- <template id="gizli-nav-sergi"> -->
                <a href="#sergi" class="nav-link-emphasis"><span data-i18n="nav_exhibition"></span></a>
                <!--  </template> -->

                <div class="lang-switch lang-switch-desktop">
                    <button onclick="setLanguage('tr')" id="lang-tr" class="lang-btn active">TR</button>
                    <span>|</span>
                    <button onclick="setLanguage('en')" id="lang-en" class="lang-btn">EN</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero custom-dark-bg">
        <div class="container hero-grid">
            <div class="hero-main">
                <p class="hero-badge"><span class="badge-line"></span><span data-i18n="hero_badge"></span></p>
                <h1 data-i18n="hero_title" class="hero-title"></h1>
            </div>
            <div class="hero-side">
                <p data-i18n="hero_desc" class="hero-desc"></p>

                <!--  <template id="gizli-hero-btn"> -->
                <a href="#sergi" class="hero-link">
                    <span data-i18n="hero_btn"></span>
                    <span class="hero-link-icon"><i class="ph ph-arrow-down-right"></i></span>
                </a>
                <!--    </template>-->
            </div>
        </div>
    </section>

    <section id="tanitim" class="section">
        <div class="container section-grid">
            <div class="section-index">
                <span class="section-no">01</span>
                <h2 data-i18n="section_manifesto" class="section-label"></h2>
            </div>

            <div class="section-content">
                <h3 data-i18n="manifesto_h3" class="manifesto-title"></h3>

                <div class="manifesto-columns">
                    <div>
                        <p data-i18n="manifesto_p1" class="mb-6"></p>
                        <p data-i18n="manifesto_p2"></p>
                    </div>

                    <div>
                        <div class="manifesto-quote-wrap">
                            <p data-i18n="manifesto_quote" class="manifesto-quote"></p>
                        </div>
                    </div>
                </div>

                <img src="assets/image-01.jpeg" alt="Manifesto visual" class="manifesto-index-image">
                <div class="seed-card">
                    <p data-i18n="seed_program_title" class="seed-title"></p>
                    <p data-i18n="seed_program_desc" class="seed-desc"></p>
                </div>

                <section class="dt-framework" aria-labelledby="dt-framework-title">
                    <h4 id="dt-framework-title" data-i18n="framework_title" class="dt-framework-title"></h4>
                    <p data-i18n="framework_copy" class="dt-framework-copy"></p>

                    <ol class="dt-timeline" aria-label="Design Thinking Timeline">
                        <li class="dt-step">
                            <button type="button" class="dt-step-btn" data-step="empathize"
                                data-i18n-aria="dt_step_empathize_aria">
                                <span class="dt-dot" aria-hidden="true"></span>
                                <span class="dt-step-label" data-i18n="dt_step_empathize"></span>
                                <span class="dt-step-sub" data-i18n="dt_sub_empathize"></span>
                            </button>
                        </li>
                        <li class="dt-step">
                            <button type="button" class="dt-step-btn" data-step="define"
                                data-i18n-aria="dt_step_define_aria">
                                <span class="dt-dot" aria-hidden="true"></span>
                                <span class="dt-step-label" data-i18n="dt_step_define"></span>
                                <span class="dt-step-sub" data-i18n="dt_sub_define"></span>
                            </button>
                        </li>
                        <li class="dt-step is-active">
                            <button type="button" class="dt-step-btn" data-step="ideate"
                                data-i18n-aria="dt_step_ideate_aria" aria-current="step">
                                <span class="dt-dot" aria-hidden="true"></span>
                                <span class="dt-step-label" data-i18n="dt_step_ideate"></span>
                                <span class="dt-step-sub" data-i18n="dt_sub_ideate"></span>
                            </button>
                        </li>
                        <li class="dt-step">
                            <button type="button" class="dt-step-btn" data-step="prototype"
                                data-i18n-aria="dt_step_prototype_aria">
                                <span class="dt-dot" aria-hidden="true"></span>
                                <span class="dt-step-label" data-i18n="dt_step_prototype"></span>
                                <span class="dt-step-sub" data-i18n="dt_sub_prototype"></span>
                            </button>
                        </li>
                        <li class="dt-step">
                            <button type="button" class="dt-step-btn" data-step="test"
                                data-i18n-aria="dt_step_test_aria">
                                <span class="dt-dot" aria-hidden="true"></span>
                                <span class="dt-step-label" data-i18n="dt_step_test"></span>
                                <span class="dt-step-sub" data-i18n="dt_sub_test"></span>
                            </button>
                        </li>
                    </ol>
                </section>
            </div>
        </div>
    </section>

    <section id="yurutuculer" class="section section-alt">
        <div class="container">
            <div class="section-grid section-grid-header">
                <div class="section-index">
                    <span class="section-no">02</span>
                    <h2 data-i18n="section_team" class="section-label"></h2>
                </div>
                <div class="section-content title-row">
                    <h3 data-i18n="team_h3" class="team-title"></h3>
                </div>
            </div>

            <div id="instructors-grid" class="instructors-grid"></div>
        </div>
    </section>

    <!-- <template id="gizli-sergi-alani">-->
    <section id="sergi" class="section min-h-screen">
        <div class="container">
            <div class="section-grid exhibition-header">
                <div class="section-index">
                    <span class="section-no">03</span>
                    <h2 data-i18n="section_collection" class="section-label"></h2>
                </div>
                <div class="section-content collection-content">
                    <h3 data-i18n="collection_h3" class="collection-title"></h3>
                    <p data-i18n="collection_desc" class="collection-desc"></p>
                </div>
                <div class="exhibition-links">
                    <a href="#sergi-eggdrop" class="exhibition-link-btn" data-i18n="collection_btn_eggdrop"></a>
                    <a href="#sergi-hotbeverage" class="exhibition-link-btn" data-i18n="collection_btn_hotbeverage"></a>
                </div>
            </div>

            <div id="sergi-eggdrop" class="exhibition-block">
                <div class="exhibition-block-head">
                    <div>
                        <h4 data-i18n="eggdrop_title" class="exhibition-block-title"></h4>
                        <p data-i18n="eggdrop_desc" class="exhibition-block-desc"></p>
                    </div>
                </div>
                <div id="projects-grid-eggdrop" class="projects-grid"></div>
            </div>

            <div id="sergi-hotbeverage" class="exhibition-block">
                <div class="exhibition-block-head">
                    <div>
                        <h4 data-i18n="hotbeverage_title" class="exhibition-block-title"></h4>
                        <p data-i18n="hotbeverage_desc" class="exhibition-block-desc"></p>
                    </div>
                </div>
                <div id="projects-grid-hotbeverage" class="projects-grid"></div>
            </div>
        </div>
    </section>
    <!--   </template>-->

    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="footer-logos">
                        <img src="assets/logos/ozyegin-university.svg" alt="Özyeğin University Logo"
                            class="footer-logo-uni">
                        <img src="assets/logos/idexai26.svg" alt="IDExAI.26 Logo" class="footer-logo-idexai">
                    </div>
                    <div data-i18n="footer_dept" class="footer-dept"></div>
                </div>
                <div class="footer-tags">
                    <span>#IDExAI26</span>
                    <span>#AIxDesign</span>
                    <span>#OzU</span>
                    <div class="footer-social">
                        <a href="https://www.instagram.com/ozuide/" target="_blank" rel="noopener noreferrer"
                            aria-label="Instagram">
                            <i class="ph ph-instagram-logo"></i>
                        </a>
                        <a href="https://www.ozyegin.edu.tr/tr/endustriyel-tasarim" target="_blank"
                            rel="noopener noreferrer" aria-label="Website">
                            <i class="ph ph-globe"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="footer-line"></div>
            <div data-i18n="footer_rights" class="footer-rights"></div>
        </div>
    </footer>

    <div id="project-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="closeModal()"></div>

        <div class="modal-content">
            <button onclick="closeModal()" class="modal-close"><i class="ph ph-x"></i></button>

            <div class="modal-image-wrap">
                <img id="modal-image" src="" alt="Sunum Paftası" class="modal-image">
            </div>

            <div class="modal-side">
                <div>
                    <span id="modal-year" class="modal-year"></span>
                    <h3 id="modal-title" class="modal-title"></h3>
                    <p class="modal-designer"><span data-i18n="modal_designer"></span>: <span id="modal-student"
                            class="text-white"></span></p>
                    <p id="modal-short-desc" class="modal-text modal-short-desc"></p>
                </div>

                <div class="modal-divider"></div>

                <div>
                    <h4 data-i18n="modal_process_h4" class="modal-subtitle"></h4>
                    <p data-i18n="modal_process_p" class="modal-text"></p>

                    <a href="#" id="modal-pdf-btn" target="_blank" class="modal-btn">
                        <span data-i18n="modal_logbook_btn"></span> <i class="ph ph-arrow-right"></i>
                    </a>
                </div>

                <div>
                    <h4 data-i18n="modal_tools_h4" class="modal-subtitle"></h4>
                    <div id="modal-tools-container" class="modal-tools"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="global-filter-bar" class="global-filter-bar">
        <div class="container global-filter-inner">
            <label class="global-filter-label" for="global-class-filter" data-i18n="global_filter_class"></label>
            <select id="global-class-filter" class="global-filter-select">
                <option value="all" data-i18n="filter_all"></option>
                <option value="y1" data-i18n="filter_y1"></option>
                <option value="y2" data-i18n="filter_y2"></option>
                <option value="y3" data-i18n="filter_y3"></option>
                <option value="y4" data-i18n="filter_y4"></option>
            </select>
            <input id="global-student-search-input" class="global-filter-input" type="text">
        </div>
    </div>

    <script src="./data.js"></script>
    <script src="./script.js"></script>
</body>

</html>
